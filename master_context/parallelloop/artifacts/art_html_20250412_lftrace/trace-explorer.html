<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langfuse Trace Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #1c2128;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-cyan: #00d9ff;
            --accent-cyan-dim: rgba(0, 217, 255, 0.15);
            --accent-green: #3fb950;
            --accent-green-dim: rgba(63, 185, 80, 0.15);
            --accent-amber: #d29922;
            --accent-amber-dim: rgba(210, 153, 34, 0.15);
            --accent-red: #f85149;
            --accent-red-dim: rgba(248, 81, 73, 0.15);
            --accent-purple: #a371f7;
            --accent-purple-dim: rgba(163, 113, 247, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 18px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .last-updated {
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--accent-cyan-dim);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: rgba(0, 217, 255, 0.25);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .refresh-btn.loading .refresh-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }

        .kpi-card.success::before {
            background: var(--accent-green);
        }

        .kpi-card.warning::before {
            background: var(--accent-amber);
        }

        .kpi-card.error::before {
            background: var(--accent-red);
        }

        .kpi-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .kpi-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .kpi-trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 8px;
        }

        .kpi-trend.up {
            background: var(--accent-green-dim);
            color: var(--accent-green);
        }

        .kpi-trend.down {
            background: var(--accent-red-dim);
            color: var(--accent-red);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title-icon {
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .panel-actions {
            display: flex;
            gap: 8px;
        }

        .filter-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
        }

        .panel-body {
            padding: 0;
            max-height: 600px;
            overflow-y: auto;
        }

        .panel-body::-webkit-scrollbar {
            width: 6px;
        }

        .panel-body::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .trace-table {
            width: 100%;
            border-collapse: collapse;
        }

        .trace-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .trace-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: top;
        }

        .trace-table tr {
            transition: background 0.15s ease;
        }

        .trace-table tbody tr:hover {
            background: var(--bg-hover);
        }

        .trace-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent-cyan);
        }

        .trace-name {
            font-weight: 500;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-badge.success {
            background: var(--accent-green-dim);
            color: var(--accent-green);
        }

        .status-badge.warning {
            background: var(--accent-amber-dim);
            color: var(--accent-amber);
        }

        .status-badge.error {
            background: var(--accent-red-dim);
            color: var(--accent-red);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .latency {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .latency.fast { color: var(--accent-green); }
        .latency.medium { color: var(--accent-amber); }
        .latency.slow { color: var(--accent-red); }

        .tokens {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .timestamp {
            font-size: 12px;
            color: var(--text-muted);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-message {
            color: var(--text-muted);
            font-size: 13px;
        }

        .loading-skeleton {
            padding: 16px;
        }

        .skeleton-row {
            display: flex;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .skeleton-bar {
            height: 16px;
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-hover) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        .skeleton-bar.sm { width: 60px; }
        .skeleton-bar.md { width: 120px; }
        .skeleton-bar.lg { width: 180px; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .error-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-red-dim);
            border: 2px solid var(--accent-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-red);
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .error-hint {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .retry-btn {
            padding: 8px 16px;
            background: var(--accent-red-dim);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            border-radius: 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .retry-btn:hover {
            background: rgba(248, 81, 73, 0.25);
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .dashboard {
                padding: 16px;
            }

            .header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .trace-table {
                font-size: 12px;
            }

            .trace-table th,
            .trace-table td {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="header-left">
                <div class="logo">LF</div>
                <div>
                    <h1>Trace Explorer</h1>
                    <div class="header-subtitle">Real-time LLM observability</div>
                </div>
            </div>
            <div class="header-right">
                <span class="last-updated" id="last-updated">Last updated: --</span>
                <button class="refresh-btn" id="refresh-btn" onclick="refreshData()">
                    <svg class="refresh-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                        <path d="M21 3v5h-5"/>
                    </svg>
                    Refresh
                </button>
            </div>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card" id="kpi-traces">
                <div class="kpi-label">Total Traces</div>
                <div class="kpi-value" id="kpi-traces-value">--</div>
                <div class="kpi-subtitle">Last 24 hours</div>
            </div>
            <div class="kpi-card success" id="kpi-success">
                <div class="kpi-label">Success Rate</div>
                <div class="kpi-value" id="kpi-success-value">--</div>
                <div class="kpi-subtitle">Traces without errors</div>
            </div>
            <div class="kpi-card" id="kpi-latency">
                <div class="kpi-label">Avg Latency</div>
                <div class="kpi-value" id="kpi-latency-value">--</div>
                <div class="kpi-subtitle">Median response time</div>
            </div>
            <div class="kpi-card" id="kpi-tokens">
                <div class="kpi-label">Total Tokens</div>
                <div class="kpi-value" id="kpi-tokens-value">--</div>
                <div class="kpi-subtitle">Input + output tokens</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="panel-title-icon"></span>
                        Recent Traces
                    </div>
                    <div class="panel-actions">
                        <select class="filter-select" id="limit-select" onchange="refreshData()">
                            <option value="20">20 traces</option>
                            <option value="50" selected>50 traces</option>
                            <option value="100">100 traces</option>
                        </select>
                    </div>
                </div>
                <div class="panel-body" id="traces-panel">
                    <div class="loading-skeleton">
                        <div class="skeleton-row">
                            <div class="skeleton-bar sm"></div>
                            <div class="skeleton-bar lg"></div>
                            <div class="skeleton-bar sm"></div>
                            <div class="skeleton-bar md"></div>
                        </div>
                        <div class="skeleton-row">
                            <div class="skeleton-bar sm"></div>
                            <div class="skeleton-bar lg"></div>
                            <div class="skeleton-bar sm"></div>
                            <div class="skeleton-bar md"></div>
                        </div>
                        <div class="skeleton-row">
                            <div class="skeleton-bar sm"></div>
                            <div class="skeleton-bar lg"></div>
                            <div class="skeleton-bar sm"></div>
                            <div class="skeleton-bar md"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Configuration
        const PLAYBOOK_API_URL = 'http://localhost:8000';
        const ORG_ID = 'df0e7d4a-54d6-4254-aa35-07ea36053783';

        // State
        let traces = [];

        // API Helper
        async function executeLangfuseTool(toolName, params = {}) {
            const response = await fetch(`${PLAYBOOK_API_URL}/api/v1/integrations/tools/execute/`, {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Org-ID': ORG_ID,
                },
                body: JSON.stringify({
                    organization_id: ORG_ID,
                    tool_name: toolName,
                    params: params,
                }),
            });
            const result = await response.json();
            if (!result.success || !result.data.successful) {
                throw new Error(result.data?.error || `Tool ${toolName} failed`);
            }
            return result.data.data;
        }

        // Format helpers
        function formatLatency(ms) {
            if (!ms) return '--';
            if (ms < 1000) return `${Math.round(ms)}ms`;
            return `${(ms / 1000).toFixed(2)}s`;
        }

        function formatTokens(usage) {
            if (!usage) return '--';
            const total = (usage.input || usage.promptTokens || 0) + (usage.output || usage.completionTokens || 0);
            if (total === 0) return '--';
            if (total >= 1000) return `${(total / 1000).toFixed(1)}k`;
            return total.toString();
        }

        function formatTime(timestamp) {
            if (!timestamp) return '--';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            return date.toLocaleDateString();
        }

        function getLatencyClass(ms) {
            if (!ms) return '';
            if (ms < 1000) return 'fast';
            if (ms < 3000) return 'medium';
            return 'slow';
        }

        function getStatusFromTrace(trace) {
            // Check for errors in observations or trace level
            if (trace.level === 'ERROR' || trace.status === 'error') return 'error';
            if (trace.level === 'WARNING' || trace.status === 'warning') return 'warning';
            return 'success';
        }

        // Render functions
        function renderTraces(tracesData) {
            const panel = document.getElementById('traces-panel');
            traces = tracesData || [];

            if (!traces.length) {
                panel.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">No traces found</div>
                        <div class="empty-message">No traces recorded in the last 24 hours</div>
                    </div>
                `;
                return;
            }

            // Calculate KPIs
            const totalTraces = traces.length;
            const errorTraces = traces.filter(t => getStatusFromTrace(t) === 'error').length;
            const successRate = totalTraces > 0 ? ((totalTraces - errorTraces) / totalTraces * 100).toFixed(1) : 0;

            const latencies = traces.map(t => t.latency).filter(l => l);
            const avgLatency = latencies.length > 0 ? latencies.reduce((a, b) => a + b, 0) / latencies.length : 0;

            let totalTokens = 0;
            traces.forEach(t => {
                if (t.totalTokens) totalTokens += t.totalTokens;
                else if (t.usage) {
                    totalTokens += (t.usage.input || 0) + (t.usage.output || 0);
                }
            });

            // Update KPIs
            document.getElementById('kpi-traces-value').textContent = totalTraces;
            document.getElementById('kpi-success-value').textContent = `${successRate}%`;
            document.getElementById('kpi-latency-value').textContent = formatLatency(avgLatency);
            document.getElementById('kpi-tokens-value').textContent = totalTokens >= 1000 ? `${(totalTokens / 1000).toFixed(1)}k` : totalTokens;

            // Render table
            panel.innerHTML = `
                <table class="trace-table">
                    <thead>
                        <tr>
                            <th>Trace ID</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Latency</th>
                            <th>Tokens</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${traces.map(trace => `
                            <tr>
                                <td><span class="trace-id">${trace.id ? trace.id.substring(0, 8) : '--'}</span></td>
                                <td><span class="trace-name" title="${trace.name || '--'}">${trace.name || '--'}</span></td>
                                <td>
                                    <span class="status-badge ${getStatusFromTrace(trace)}">
                                        <span class="status-dot"></span>
                                        ${getStatusFromTrace(trace)}
                                    </span>
                                </td>
                                <td><span class="latency ${getLatencyClass(trace.latency)}">${formatLatency(trace.latency)}</span></td>
                                <td><span class="tokens">${formatTokens(trace.usage || { input: trace.inputTokens, output: trace.outputTokens })}</span></td>
                                <td><span class="timestamp">${formatTime(trace.timestamp)}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function showLoadingState(panelId) {
            const panel = document.getElementById(panelId);
            panel.innerHTML = `
                <div class="loading-skeleton">
                    <div class="skeleton-row">
                        <div class="skeleton-bar sm"></div>
                        <div class="skeleton-bar lg"></div>
                        <div class="skeleton-bar sm"></div>
                    </div>
                    <div class="skeleton-row">
                        <div class="skeleton-bar sm"></div>
                        <div class="skeleton-bar lg"></div>
                        <div class="skeleton-bar sm"></div>
                    </div>
                    <div class="skeleton-row">
                        <div class="skeleton-bar sm"></div>
                        <div class="skeleton-bar lg"></div>
                        <div class="skeleton-bar sm"></div>
                    </div>
                </div>
            `;
        }

        function showError(panelId, message, retryFn) {
            const panel = document.getElementById(panelId);

            let errorHtml = `
                <div class="error-state">
                    <div class="error-icon">!</div>
                    <div class="error-message">${message}</div>
            `;

            if (message.includes('not connected')) {
                errorHtml += `<div class="error-hint">Connect Langfuse in Settings to view this data</div>`;
            } else if (message.includes('authentication') || message.includes('401')) {
                errorHtml += `<div class="error-hint">Please reconnect Langfuse in Settings</div>`;
            }

            errorHtml += `
                    <button class="retry-btn" onclick="${retryFn}">Retry</button>
                </div>
            `;

            panel.innerHTML = errorHtml;
        }

        // Data loading
        async function loadTraces() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            showLoadingState('traces-panel');

            try {
                const limit = parseInt(document.getElementById('limit-select').value);
                const data = await executeLangfuseTool('LANGFUSE_MCP_FETCH_TRACES', {
                    age: 1440,
                    limit: limit
                });

                // Handle both array and object with traces property
                const tracesArray = Array.isArray(data) ? data : (data.traces || data.data || []);
                renderTraces(tracesArray);

                document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                console.error('Failed to load traces:', error);
                showError('traces-panel', error.message, 'loadTraces()');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        async function refreshData() {
            await loadTraces();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTraces();
        });
    </script>
</body>
</html>
