<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallelloop MCP Live Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #07080c;
            --bg-secondary: #0f1117;
            --bg-tertiary: #161922;
            --bg-card: #12151e;
            --accent-primary: #818cf8;
            --accent-secondary: #a78bfa;
            --accent-cyan: #22d3ee;
            --accent-emerald: #34d399;
            --accent-amber: #fbbf24;
            --accent-rose: #fb7185;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #1e2433;
            --gradient-primary: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #c4b5fd 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(129, 140, 248, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(129, 140, 248, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(129, 140, 248, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1500px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 52px;
            height: 52px;
            background: var(--gradient-primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            box-shadow: 0 8px 24px rgba(129, 140, 248, 0.25);
        }

        .header-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            color: var(--text-secondary);
            font-size: 0.8125rem;
            margin-top: 0.125rem;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.8125rem;
            color: var(--accent-emerald);
            font-weight: 500;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-emerald);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .refresh-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.625rem 1.25rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent-primary);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover::before { opacity: 1; }
        .stat-card:hover { transform: translateY(-2px); border-color: rgba(129, 140, 248, 0.3); }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .panels-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .panel:hover { border-color: rgba(129, 140, 248, 0.4); }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .panel-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .panel-name {
            font-weight: 600;
            font-size: 0.9375rem;
        }

        .panel-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6875rem;
            padding: 0.3rem 0.625rem;
            background: rgba(129, 140, 248, 0.1);
            color: var(--accent-secondary);
            border-radius: 100px;
            font-weight: 500;
        }

        .panel-content {
            padding: 1rem 1.25rem;
            max-height: 280px;
            overflow-y: auto;
        }

        .panel-content::-webkit-scrollbar { width: 5px; }
        .panel-content::-webkit-scrollbar-track { background: transparent; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        .data-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1rem;
            background: var(--bg-secondary);
            border-radius: 10px;
            margin-bottom: 0.625rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .data-row:last-child { margin-bottom: 0; }
        .data-row:hover { background: var(--bg-tertiary); border-color: var(--border-color); }

        .data-row-main {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .data-row-title {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .data-row-meta {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.625rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .status {
            font-size: 0.625rem;
            padding: 0.2rem 0.5rem;
            border-radius: 100px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status-active { background: rgba(52, 211, 153, 0.15); color: var(--accent-emerald); }
        .status-setup { background: rgba(251, 191, 36, 0.15); color: var(--accent-amber); }
        .status-default { background: rgba(129, 140, 248, 0.15); color: var(--accent-primary); }

        .user-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.125rem;
        }

        .user-info { flex: 1; }
        .user-name { font-weight: 600; font-size: 1rem; }
        .user-email { font-size: 0.8125rem; color: var(--text-muted); }

        .org-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .org-tag {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            background: var(--bg-primary);
            border-radius: 100px;
            font-size: 0.75rem;
        }

        .org-tag .role {
            font-size: 0.625rem;
            padding: 0.125rem 0.375rem;
            background: rgba(52, 211, 153, 0.15);
            color: var(--accent-emerald);
            border-radius: 4px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1.5rem;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.4;
        }

        .empty-text {
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .error-state {
            text-align: center;
            padding: 2rem 1.5rem;
            background: rgba(251, 113, 133, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(251, 113, 133, 0.2);
        }

        .error-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .error-text {
            color: var(--accent-rose);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .retry-btn {
            background: rgba(251, 113, 133, 0.15);
            border: 1px solid rgba(251, 113, 133, 0.3);
            color: var(--accent-rose);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .retry-btn:hover {
            background: rgba(251, 113, 133, 0.25);
        }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        .skeleton-row {
            height: 56px;
            margin-bottom: 0.625rem;
        }

        .api-log {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .api-log-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }

        .api-log-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .api-log-content {
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        .log-entry {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .log-entry:last-child { border-bottom: none; }

        .log-time { color: var(--text-muted); white-space: nowrap; }
        .log-tool { color: var(--accent-cyan); }
        .log-status-ok { color: var(--accent-emerald); }
        .log-status-err { color: var(--accent-rose); }
        .log-msg { color: var(--text-secondary); flex: 1; }

        @media (max-width: 1200px) {
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .panels-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 1rem; text-align: center; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .header-actions { width: 100%; justify-content: center; }
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <header class="header">
            <div class="logo-section">
                <div class="logo">PL</div>
                <div class="header-text">
                    <h1>Parallelloop MCP Live Explorer</h1>
                    <p>Real-time Model Context Protocol Dashboard</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="live-badge">
                    <span class="live-dot"></span>
                    <span>Live Data</span>
                </div>
                <button class="refresh-btn" onclick="loadAllData()">
                    <span>&#8635;</span> Refresh
                </button>
            </div>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Projects</div>
                <div class="stat-value" id="stat-projects">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Teams</div>
                <div class="stat-value" id="stat-teams">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Members</div>
                <div class="stat-value" id="stat-members">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Artifacts</div>
                <div class="stat-value" id="stat-artifacts">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Actions</div>
                <div class="stat-value" id="stat-actions">--</div>
            </div>
        </div>

        <div class="panels-grid">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="panel-icon" style="background: rgba(167, 139, 250, 0.15); color: var(--accent-secondary);">&#128100;</div>
                        <span class="panel-name">Current User</span>
                    </div>
                    <span class="panel-badge">get_me</span>
                </div>
                <div class="panel-content" id="panel-user">
                    <div class="skeleton skeleton-row"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="panel-icon" style="background: rgba(129, 140, 248, 0.15); color: var(--accent-primary);">&#128194;</div>
                        <span class="panel-name">Projects</span>
                    </div>
                    <span class="panel-badge">list_projects</span>
                </div>
                <div class="panel-content" id="panel-projects">
                    <div class="skeleton skeleton-row"></div>
                    <div class="skeleton skeleton-row"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="panel-icon" style="background: rgba(34, 211, 238, 0.15); color: var(--accent-cyan);">&#128101;</div>
                        <span class="panel-name">Teams</span>
                    </div>
                    <span class="panel-badge">list_teams</span>
                </div>
                <div class="panel-content" id="panel-teams">
                    <div class="skeleton skeleton-row"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="panel-icon" style="background: rgba(251, 191, 36, 0.15); color: var(--accent-amber);">&#9889;</div>
                        <span class="panel-name">Actions</span>
                    </div>
                    <span class="panel-badge">list_actions</span>
                </div>
                <div class="panel-content" id="panel-actions">
                    <div class="skeleton skeleton-row"></div>
                </div>
            </div>
        </div>

        <div class="api-log">
            <div class="api-log-header">
                <div class="api-log-title">
                    <span>&#128203;</span> MCP API Call Log
                </div>
            </div>
            <div class="api-log-content" id="api-log">
                <div class="log-entry">
                    <span class="log-time">--:--:--</span>
                    <span class="log-msg">Waiting for API calls...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration - resolved from resolve-config.sh
        const PLAYBOOK_API_URL = 'http://host.docker.internal:8000';
        const ORG_ID = 'df0e7d4a-54d6-4254-aa35-07ea36053783';

        const apiLogEl = document.getElementById('api-log');

        function logApi(tool, status, message) {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const statusClass = status === 'ok' ? 'log-status-ok' : status === 'err' ? 'log-status-err' : 'log-tool';
            const statusText = status === 'ok' ? '✓' : status === 'err' ? '✗' : '→';

            const entry = document.createElement('div');
            entry.className = 'log-entry fade-in';
            entry.innerHTML = '<span class="log-time">' + time + '</span>' +
                '<span class="log-tool">' + tool + '</span>' +
                '<span class="' + statusClass + '">' + statusText + '</span>' +
                '<span class="log-msg">' + message + '</span>';

            if (apiLogEl.children.length === 1 && apiLogEl.children[0].textContent.includes('Waiting')) {
                apiLogEl.innerHTML = '';
            }

            apiLogEl.insertBefore(entry, apiLogEl.firstChild);

            while (apiLogEl.children.length > 20) {
                apiLogEl.removeChild(apiLogEl.lastChild);
            }
        }

        async function executeMcpTool(toolName, params) {
            params = params || {};
            const fullToolName = 'mcp__parallelloop__' + toolName;
            logApi(toolName, 'call', 'Calling ' + fullToolName + '...');

            try {
                const response = await fetch(PLAYBOOK_API_URL + '/api/v1/context/mcp/execute/', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Org-ID': ORG_ID,
                    },
                    body: JSON.stringify({
                        organization_id: ORG_ID,
                        tool_name: fullToolName,
                        params: Object.assign({}, params, { org_id: ORG_ID }),
                    }),
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                }

                const result = await response.json();

                if (result.success === false) {
                    throw new Error(result.error?.message || result.message || 'API request failed');
                }

                const data = result.data?.data || result.data || result;
                logApi(toolName, 'ok', 'Success - received data');
                return data;

            } catch (error) {
                logApi(toolName, 'err', error.message);
                throw error;
            }
        }

        function renderUser(data) {
            const el = document.getElementById('panel-user');
            if (!data) {
                el.innerHTML = renderError('Failed to load user data');
                return;
            }

            const initials = ((data.first_name || '')[0] || '') + ((data.last_name || '')[0] || '');
            const orgs = data.organizations || [];

            el.innerHTML = '<div class="user-card fade-in">' +
                '<div class="user-avatar">' + (initials.toUpperCase() || '?') + '</div>' +
                '<div class="user-info">' +
                '<div class="user-name">' + (data.first_name || '') + ' ' + (data.last_name || '') + '</div>' +
                '<div class="user-email">' + (data.email || 'No email') + '</div>' +
                '<div class="org-tags">' +
                orgs.map(function(o) {
                    return '<div class="org-tag"><span>' + o.name + '</span><span class="role">' + o.role + '</span></div>';
                }).join('') +
                '</div></div></div>';
        }

        function renderProjects(data) {
            const el = document.getElementById('panel-projects');
            const statEl = document.getElementById('stat-projects');
            const projects = (data && data.projects) || [];

            statEl.textContent = projects.length;

            if (projects.length === 0) {
                el.innerHTML = renderEmpty('No projects yet');
                return;
            }

            el.innerHTML = projects.map(function(p, i) {
                return '<div class="data-row fade-in" style="animation-delay: ' + (i * 0.05) + 's">' +
                    '<div class="data-row-main">' +
                    '<div class="data-row-title">' + p.name + '</div>' +
                    '<div class="data-row-meta">' +
                    '<span class="tag">' + (p.type || 'PROJECT') + '</span>' +
                    '<span>' + formatDate(p.created_at) + '</span>' +
                    '</div></div>' +
                    '<span class="status ' + getStatusClass(p.status) + '">' + (p.status || 'active') + '</span>' +
                    '</div>';
            }).join('');
        }

        function renderTeams(data) {
            const el = document.getElementById('panel-teams');
            const statEl = document.getElementById('stat-teams');
            const teams = (data && data.teams) || [];

            statEl.textContent = teams.length;

            if (teams.length === 0) {
                el.innerHTML = renderEmpty('No teams yet');
                return;
            }

            el.innerHTML = teams.map(function(t, i) {
                return '<div class="data-row fade-in" style="animation-delay: ' + (i * 0.05) + 's">' +
                    '<div class="data-row-main">' +
                    '<div class="data-row-title">' + t.name + '</div>' +
                    '<div class="data-row-meta">' +
                    '<span class="tag">' + (t.team_type || 'GENERAL') + '</span>' +
                    '<span>' + (t.member_count || 0) + ' members</span>' +
                    '</div></div>' +
                    (t.is_default ? '<span class="status status-default">Default</span>' : '') +
                    '</div>';
            }).join('');
        }

        function renderActions(data) {
            const el = document.getElementById('panel-actions');
            const statEl = document.getElementById('stat-actions');
            const actions = (data && data.actions) || [];

            statEl.textContent = actions.length;

            if (actions.length === 0) {
                el.innerHTML = renderEmpty('No actions yet<br>Questions, decisions & blockers appear here');
                return;
            }

            el.innerHTML = actions.map(function(a, i) {
                return '<div class="data-row fade-in" style="animation-delay: ' + (i * 0.05) + 's">' +
                    '<div class="data-row-main">' +
                    '<div class="data-row-title">' + (a.title || 'Untitled') + '</div>' +
                    '<div class="data-row-meta">' +
                    '<span class="tag">' + (a.type || 'ACTION') + '</span>' +
                    '<span>' + (a.priority || 'normal') + ' priority</span>' +
                    '</div></div>' +
                    '<span class="status ' + getStatusClass(a.status) + '">' + (a.status || 'open') + '</span>' +
                    '</div>';
            }).join('');
        }

        function getStatusClass(status) {
            if (!status) return 'status-active';
            var s = status.toLowerCase();
            if (s.includes('active') || s.includes('open')) return 'status-active';
            if (s.includes('setup') || s.includes('progress')) return 'status-setup';
            return 'status-default';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            var d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderEmpty(msg) {
            return '<div class="empty-state fade-in">' +
                '<div class="empty-icon">&#128203;</div>' +
                '<p class="empty-text">' + msg + '</p></div>';
        }

        function renderError(msg) {
            return '<div class="error-state fade-in">' +
                '<div class="error-icon">&#9888;</div>' +
                '<p class="error-text">' + msg + '</p>' +
                '<button class="retry-btn" onclick="loadAllData()">Retry</button></div>';
        }

        function showLoading(elId) {
            var el = document.getElementById(elId);
            if (el) {
                el.innerHTML = '<div class="skeleton skeleton-row"></div>' +
                    '<div class="skeleton skeleton-row"></div>';
            }
        }

        async function loadAllData() {
            var btn = document.querySelector('.refresh-btn');
            btn.disabled = true;
            btn.innerHTML = '<span style="animation: spin 1s linear infinite;">&#8635;</span> Loading...';

            ['panel-user', 'panel-projects', 'panel-teams', 'panel-actions'].forEach(showLoading);

            var results = await Promise.allSettled([
                executeMcpTool('get_me'),
                executeMcpTool('list_projects', { limit: 10 }),
                executeMcpTool('list_teams', { limit: 10 }),
                executeMcpTool('list_actions', { limit: 10 }),
                executeMcpTool('list_members', { limit: 25 }),
                executeMcpTool('list_artifacts', { limit: 25 }),
            ]);

            if (results[0].status === 'fulfilled') {
                renderUser(results[0].value);
            } else {
                document.getElementById('panel-user').innerHTML = renderError('Failed to load user');
            }

            if (results[1].status === 'fulfilled') {
                renderProjects(results[1].value);
            } else {
                document.getElementById('panel-projects').innerHTML = renderError('Failed to load projects');
                document.getElementById('stat-projects').textContent = '--';
            }

            if (results[2].status === 'fulfilled') {
                renderTeams(results[2].value);
            } else {
                document.getElementById('panel-teams').innerHTML = renderError('Failed to load teams');
                document.getElementById('stat-teams').textContent = '--';
            }

            if (results[3].status === 'fulfilled') {
                renderActions(results[3].value);
            } else {
                document.getElementById('panel-actions').innerHTML = renderError('Failed to load actions');
                document.getElementById('stat-actions').textContent = '--';
            }

            if (results[4].status === 'fulfilled') {
                var members = (results[4].value && results[4].value.members) || [];
                document.getElementById('stat-members').textContent = members.length;
            } else {
                document.getElementById('stat-members').textContent = '--';
            }

            if (results[5].status === 'fulfilled') {
                var artifacts = (results[5].value && results[5].value.artifacts) || [];
                document.getElementById('stat-artifacts').textContent = artifacts.length;
            } else {
                document.getElementById('stat-artifacts').textContent = '--';
            }

            btn.disabled = false;
            btn.innerHTML = '<span>&#8635;</span> Refresh';
        }

        loadAllData();
    </script>
</body>
</html>
